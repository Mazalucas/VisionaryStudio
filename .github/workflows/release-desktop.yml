name: Release desktop packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (portable Node + dist)
        env:
          NODE_VERSION: 22.14.0
        run: bash ./scripts/package-desktop.sh win x64 out

      - uses: actions/upload-artifact@v4
        with:
          name: VisionaryStudio-windows-x64
          path: out/VisionaryStudio-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (portable Node + dist)
        env:
          NODE_VERSION: 22.14.0
        run: bash ./scripts/package-desktop.sh mac arm64 out

      - uses: actions/upload-artifact@v4
        with:
          name: VisionaryStudio-macos-arm64
          path: out/VisionaryStudio-macos-arm64.tar.gz

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f -print

      # Flatten paths: softprops + nested artifact folders can miss globs; copy to a single dir.
      - name: Stage release assets
        run: |
          mkdir -p flat
          find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp -v {} flat/ \;
          echo "--- flat/ ---"
          ls -la flat/
          count=$(find flat -type f | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "No zip/tar.gz found under release-assets"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flat/*.zip
            flat/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
